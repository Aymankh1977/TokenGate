<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Gateway - Provider Partnership Pitch</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(135deg, #F0F4F8 0%, #E8EEF5 100%);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Left Section - Title & Tagline */
        .left-section {
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }

        .title-wrapper {
            border-left: 4px solid #FDB913;
            padding-left: 30px;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #1E40AF;
            line-height: 1.1;
            letter-spacing: -0.05em;
            margin-bottom: 20px;
        }

        .tagline {
            font-family: 'Inter', sans-serif;
            font-size: 24px;
            font-weight: 400;
            color: #1F2937;
            line-height: 1.4;
        }

        .presented-to {
            border-top: 1px solid #FDB913;
            border-bottom: 1px solid #FDB913;
            padding: 20px 0;
            margin-top: 20px;
        }

        .presented-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #FDB913;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .presented-text {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #1F2937;
        }

        /* Right Section - Metrics */
        .right-section {
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 30px;
            background: rgba(253, 185, 19, 0.05);
            border-left: 1px solid #FDB913;
            height: 100%;
        }

        .metric-box {
            border-left: 3px solid #FDB913;
            padding-left: 20px;
        }

        .metric-value {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: #FDB913;
            line-height: 1;
            margin-bottom: 8px;
        }

        .metric-label {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: #1F2937;
            line-height: 1.4;
        }

        /* Bottom Section */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 60px;
            background: rgba(30, 64, 175, 0.05);
            border-top: 1px solid #FDB913;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #1F2937;
        }

        .cta-button {
            background: #FDB913;
            color: #1E40AF;
            padding: 12px 28px;
            border: none;
            border-radius: 0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background: #1E40AF;
            color: #FDB913;
        }

        /* Decorative Elements */
        .accent-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            background: #FDB913;
            top: -100px;
            right: -100px;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            background: #1E40AF;
            bottom: -50px;
            left: -50px;
        }

        /* Responsive */
        @media (max-width: 1280px) {
            .slide-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="accent-circle circle-1"></div>
        <div class="accent-circle circle-2"></div>

        <!-- Left Section -->
        <div class="left-section">
            <div class="title-wrapper">
                <h1 class="main-title">AI Token Gateway</h1>
                <p class="tagline">Unified Access. Predictable Revenue. Massive Scale.</p>
            </div>

            <div class="presented-to">
                <p class="presented-label">Strategic Partnership Opportunity</p>
                <p class="presented-text">Presented to AI API Providers</p>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="metric-box">
                <div class="metric-value">$884M</div>
                <div class="metric-label">5-Year Cumulative Provider Revenue</div>
            </div>

            <div class="metric-box">
                <div class="metric-value">500K+</div>
                <div class="metric-label">Developer Users by Year 3</div>
            </div>

            <div class="metric-box">
                <div class="metric-value">3x</div>
                <div class="metric-label">Higher Token Consumption vs Direct</div>
            </div>

            <div class="metric-box">
                <div class="metric-value">85%</div>
                <div class="metric-label">Revenue Share to Providers</div>
            </div>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <span class="date">June 2026</span>
            <button class="cta-button">Let's Discuss Partnership</button>
        </div>
    </div>
</body>
</html>
